- name: Ensure pip is installed
  ansible.builtin.package:
    name: python3-pip
    state: present
  become: true

- name: Ensure virtualenv exists
  ansible.builtin.command:
    cmd: python3 -m venv {{ python_virtualenv }}
  args:
    creates: "{{ python_virtualenv }}"

- name: Install prometheus instrumentation package
  ansible.builtin.pip:
    name: "{{ metrics_package }}"
    virtualenv: "{{ python_virtualenv }}"
    state: present
  notify: restart backend