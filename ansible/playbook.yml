---
  - name: CONFIGURE CIS ALIGNED BASELINE 
    hosts: all
    become: true
    roles:
      - hardening
      
  - name: DEPLOY NGINX FRONTEND APP
    hosts: frontend
    become: true
    roles:
      - frontend

  - name: DEPLOY PYTHON FAST API BACKEND APPLICATION
    hosts: backend
    become: true
    roles:
      - backend

  - name: CONFIGURE CERTBOT LETSENCRYPT SSL CERTIFICATE
    hosts: frontend
    become: true
    vars:
      domain_name: lennipsss.org
      certbot_email: admin@lennipsss.org
    roles:
      - certbot

  - name: INSTALL AND START NODE EXPORTER
    hosts: all
    become: true
    roles:
      - node_exporter

  - name: INSTALL AND START PROMETHEUS
    hosts: frontend
    become: true
    roles:
      - prometheus

  - name: INSTALL AND START PROMETHEUS
    hosts: frontend
    become: true
    roles:
      - grafana



